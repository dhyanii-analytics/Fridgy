{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card signup-large">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <h2>Join Fridgy</h2>
        <p>Your personalized AI kitchen starts here.</p>
        
        <form action="/signup" method="POST" id="signupForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Dhyanii Patel" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="email@example.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Age Group</label>
                    <select name="age_group">
                        <option value="10-18">10-18 Years</option>
                        <option value="19-25">19-25 Years</option>
                        <option value="26-40">26-40 Years</option>
                        <option value="41-60">41-60 Years</option>
                        <option value="60+">60+ Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Profession</label>
                    <input type="text" name="profession" placeholder="e.g. Student, IT Pro, Housewife">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>What's your vibe?</label>
                    <select name="goal">
                        <option value="fitness">Eat Clean & Stay Fit</option>
                        <option value="new_recipes">Level Up My Cooking</option>
                        <option value="just_food">Quick & Easy Meals</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Top Cuisines</label>
                    <input type="text" name="cuisine" placeholder="e.g. Indian, Italian">
                </div>
            </div>

             <div class="form-group">
                    <label>Dietary Preference:</label>
                    <select name="diet_type" required>
                        <option value="Vegetarian">Vegetarian</option>
                        <option value="Non-Vegetarian">Non-Vegetarian</option>
                        <option value="Vegan">Vegan</option>
                   </select>
            </div>
            
            <div class="form-group">
                <label>Medical Conditions (if any)</label>
                <input type="text" name="diseases" placeholder="e.g. Diabetes, Thyroid, or 'None'">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Allergies</label>
                    <input type="text" name="allergies" placeholder="e.g. Peanuts, Dairy">
                </div>
                <div class="form-group">
                    <label>I hate eating...</label>
                    <input type="text" name="dislikes" placeholder="e.g. Mushrooms, Karela">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Create Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" required>
                        <span class="eye-btn" onclick="togglePass('password', this)">👁</span>
                    </div>
                    <small id="strengthText"></small>
                </div>
                    <div class="form-group">
                      <label>Confirm Password</label>
                      <div class="password-wrapper">
                         <input type="password" name="confirm_password" id="confirm_password" required>
                         <span class="eye-btn" onclick="togglePass('confirm_password', this)">👁</span>
                       </div>
                        <small id="matchText"></small> 
                    </div>
            </div>
            
            <button type="submit" class="btn-primary full-width">Get Cooking!</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>

<script>
    function togglePass(id, btn) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            btn.innerText = "🕶";
        } else {
            input.type = "password";
            btn.innerText = "👁";
        }
    }

    const form = document.getElementById('signupForm');
    const progressBar = document.getElementById('progressBar');
    const strengthText = document.getElementById('strengthText');
    const matchText = document.getElementById('matchText'); // New reference
    const inputs = form.querySelectorAll('input, select');

    form.addEventListener('input', () => {
        // 1. Progress Bar Logic
        let filled = 0;
        inputs.forEach(input => { if (input.value.trim() !== '') filled++; });
        progressBar.style.width = (filled / inputs.length) * 100 + '%';

        // 2. Password Comparison Logic
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('confirm_password').value;

        if (p2.length > 0) { // Only check if confirm field isn't empty
            if (p1 === p2) {
                matchText.innerText = "Passwords match! ✓";
                matchText.style.color = "green";
            } else {
                matchText.innerText = "Passwords do not match ✗";
                matchText.style.color = "red";
            }
        } else {
            matchText.innerText = "";
        }

        // 3. Strength Logic
        if(p1.length < 6) {
            strengthText.innerText = "Too Short 🔴";
            strengthText.style.color = "red";
        } else if (p1.match(/[A-Z]/) && p1.match(/[0-9]/)) {
            strengthText.innerText = "Strong Password 🟢";
            strengthText.style.color = "green";
        } else {
            strengthText.innerText = "Medium Strength 🟠";
            strengthText.style.color = "orange";
        }
    });

    // Final check to block form submission if they don't match
    form.onsubmit = function(e) {
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('confirm_password').value;
        if (p1 !== p2) {
            matchText.innerText = "Please fix the mismatch before submitting!";
            matchText.style.color = "red";
            return false;
        }
    };
</script>

{% endblock %}
