{% extends "layout.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<div class="info-page" style="background: #fdfdfd; padding: 40px 20px;">
    <div style="max-width: 900px; margin: 0 auto;">
        <h1 class="highlight-title" style="font-size: 2.5rem;">Your Weekly Kitchen Plan</h1>
        <p class="intro-text">Personalized for a {{ user.diet_type }} lifestyle.</p>

        <div id="weekly-content" class="chat-response-content" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left; line-height: 1.8;">
            {{ response }}
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <a href="/dashboard" class="btn-primary" style="text-decoration: none;">Done for the Week</a>
        </div>
    </div>
</div>

<script>
    // Convert the AI's long 7-day text into proper HTML 
    document.addEventListener('DOMContentLoaded', function() {
        const el = document.getElementById('weekly-content');
        el.innerHTML = marked.parse(el.innerText.trim());
    });
</script>
{% endblock %}
